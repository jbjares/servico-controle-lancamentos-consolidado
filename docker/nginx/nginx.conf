events {}

http {
    upstream lancamentos_upstream {
        least_conn;
        server servico-lancamentos-a:8080 max_fails=3 fail_timeout=10s;
        server servico-lancamentos-b:8080 max_fails=3 fail_timeout=10s;
    }

    upstream consolidado_upstream {
        least_conn;
        server servico-consolidado-diario-a:8080 max_fails=3 fail_timeout=10s;
        server servico-consolidado-diario-b:8080 max_fails=3 fail_timeout=10s;
    }

    log_format json_combined escape=json '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"body_bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_addr":"$upstream_addr",'
      '"upstream_status":"$upstream_status",'
      '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;

        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"UP","service":"nginx-load-balancer","lancamentos_replicas":2,"consolidado_replicas":2}';
        }

        location = /nginx_status {
            stub_status;
            access_log off;
        }

        location /api/lancamentos {
            proxy_pass http://lancamentos_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /api/consolidados {
            proxy_pass http://consolidado_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /actuator/lancamentos/ {
            rewrite ^/actuator/lancamentos/(.*)$ /actuator/$1 break;
            proxy_pass http://lancamentos_upstream;
        }

        location /actuator/consolidado/ {
            rewrite ^/actuator/consolidado/(.*)$ /actuator/$1 break;
            proxy_pass http://consolidado_upstream;
        }

        location / {
            add_header Content-Type application/json;
            return 200 '{"service":"nginx-load-balancer","routes":["/api/lancamentos","/api/consolidados"],"lancamentos_replicas":2,"consolidado_replicas":2}';
        }
    }
}
