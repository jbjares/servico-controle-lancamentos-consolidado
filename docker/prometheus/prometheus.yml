global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: servico-lancamentos
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - servico-lancamentos-a:8080
          - servico-lancamentos-b:8080

  - job_name: servico-consolidado-diario
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - servico-consolidado-diario-a:8080
          - servico-consolidado-diario-b:8080

  - job_name: rabbitmq
    metrics_path: /metrics/per-object
    static_configs:
      - targets: ["rabbitmq:15692"]
