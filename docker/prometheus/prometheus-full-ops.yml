global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: servico-lancamentos
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - servico-lancamentos-a:8080
          - servico-lancamentos-b:8080

  - job_name: servico-consolidado-diario
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - servico-consolidado-diario-a:8080
          - servico-consolidado-diario-b:8080

  - job_name: rabbitmq
    metrics_path: /metrics/per-object
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]

  - job_name: promtail
    static_configs:
      - targets: ["promtail:9080"]
