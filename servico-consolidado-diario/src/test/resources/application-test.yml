spring:
  datasource:
    url: jdbc:h2:mem:consolidado_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS consolidado\;SET SCHEMA consolidado
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: consolidado
    open-in-view: false
  liquibase:
    enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

app:
  mensageria:
    exchange: lancamentos.exchange
    routing-key: lancamento.registrado
    fila: lancamento.registrado.fila