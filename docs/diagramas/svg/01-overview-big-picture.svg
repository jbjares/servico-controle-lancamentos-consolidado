<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura Alvo - Visão Executiva</title>
  <desc id="desc">Fluxo principal do comerciante, integração assíncrona com RabbitMQ, persistência em PostgreSQL, observabilidade opcional e segurança alvo com Keycloak.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="800" y="48" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    Arquitetura Alvo - Visão Executiva
  </text>
  <text x="800" y="78" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">
    Fluxo principal do comerciante, integração assíncrona e componentes de apoio
  </text>

  <rect x="30" y="110" width="1540" height="520" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="56" y="142" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">
    Fluxo principal do negócio
  </text>

  <g filter="url(#shadow)">
    <ellipse cx="180" cy="315" rx="110" ry="55" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
    <text x="180" y="302" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">1. Comerciante / Operador</text>
    <text x="180" y="325" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Registra créditos e débitos</text>
    <text x="180" y="344" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Consulta o saldo diário</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="260" width="220" height="110" rx="20" fill="#e2e8f0" stroke="#475569" stroke-width="2.5"/>
    <text x="440" y="295" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">2. Entrada única</text>
    <text x="440" y="319" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Nginx / API</text>
    <text x="440" y="339" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Recebe chamadas e distribui</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="230" width="240" height="170" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <text x="710" y="268" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">3. Serviço de Lançamentos</text>
    <text x="710" y="292" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">2 réplicas locais</text>
    <text x="710" y="316" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Salva o lançamento</text>
    <text x="710" y="336" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Grava evento no Outbox</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="870" y="260" width="220" height="110" rx="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
    <text x="980" y="295" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">4. RabbitMQ</text>
    <text x="980" y="319" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Guarda e entrega o evento</text>
    <text x="980" y="339" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">mesmo com falha temporária</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1130" y="230" width="280" height="170" rx="22" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
    <text x="1270" y="268" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">5. Serviço de Consolidado Diário</text>
    <text x="1270" y="292" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">2 réplicas locais</text>
    <text x="1270" y="316" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Lê o evento</text>
    <text x="1270" y="336" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Atualiza o saldo do dia</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="460" width="960" height="140" rx="22" fill="#ecfeff" stroke="#0891b2" stroke-width="2.5"/>
    <text x="548" y="494" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">
      6. Banco de Dados PostgreSQL
    </text>
    <rect x="580" y="508" width="350" height="64" rx="16" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
    <text x="755" y="534" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Schema lançamentos</text>
    <text x="755" y="556" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">lancamento + outbox_evento</text>

    <rect x="1060" y="508" width="350" height="64" rx="16" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
    <text x="1235" y="534" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Schema consolidado</text>
    <text x="1235" y="556" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">consolidado_diario + evento_processado</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M 520 675 h 560 v 90 h -560 z" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
    <path d="M 1080 675 l 22 18 v -18 z" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
    <text x="550" y="712" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#14532d">
      Mensagem central para o avaliador:
    </text>
    <text x="550" y="742" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#14532d">
      se o serviço de consolidado cair, o registro do lançamento continua funcionando.
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="690" width="320" height="110" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
    <text x="230" y="725" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Observabilidade opcional</text>
    <text x="230" y="748" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Prometheus + Grafana</text>
    <text x="230" y="768" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Healthchecks, métricas e dashboards</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1180" y="690" width="320" height="110" rx="20" fill="#fdf2f8" stroke="#db2777" stroke-width="2.5" stroke-dasharray="10 8"/>
    <text x="1340" y="725" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Segurança alvo - próxima sprint</text>
    <text x="1340" y="748" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">Keycloak + Realm</text>
    <text x="1340" y="768" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#0f172a">JWT Bearer + papéis e escopos</text>
  </g>

  <line x1="290" y1="315" x2="330" y2="315" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="310" y="300" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">usa a solução</text>

  <line x1="550" y1="315" x2="590" y2="315" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="570" y="300" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">registra lançamento</text>

  <line x1="830" y1="315" x2="870" y2="315" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="850" y="300" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">envia evento</text>

  <line x1="1090" y1="315" x2="1130" y2="315" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1110" y="300" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">entrega evento</text>

  <path d="M 510 245 C 720 150, 1040 150, 1210 230" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="860" y="154" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">consulta saldo diário</text>

  <line x1="710" y1="400" x2="710" y2="508" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="726" y="458" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#166534">persistência</text>

  <line x1="1270" y1="400" x2="1270" y2="508" stroke="#d97706" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="1288" y="458" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#9a3412">saldo diário</text>

  <path d="M 390 745 C 570 745, 760 745, 930 745 C 980 745, 980 440, 980 370" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="8 8"/>
  <text x="650" y="732" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#c2410c">métricas e health</text>

  <path d="M 1180 730 C 1000 640, 720 620, 500 370" fill="none" stroke="#db2777" stroke-width="2.5" stroke-dasharray="8 8"/>
  <text x="930" y="612" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#be185d">token Bearer e autorização</text>
</svg>
