name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  maven-tests:
    name: Maven tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Testar servico-lancamentos
        working-directory: servico-lancamentos
        run: mvn -B test

      - name: Testar servico-consolidado-diario
        working-directory: servico-consolidado-diario
        run: mvn -B test

  compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: maven-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar docker-compose
        run: docker compose --profile full-ops config

      - name: Subir stack full-ops
        run: docker compose --profile full-ops up --build -d

      - name: Aguardar readiness e observabilidade
        run: |
          ./tests/ci/wait-url.sh \
            http://localhost:8080/health \
            http://localhost:8081/actuator/health/readiness \
            http://localhost:8084/actuator/health/readiness \
            http://localhost:8082/actuator/health/readiness \
            http://localhost:8085/actuator/health/readiness \
            http://localhost:9090/-/ready \
            http://localhost:9093/-/ready \
            http://localhost:3000/api/health \
            http://localhost:3100/ready \
            http://localhost:9113/metrics \
            http://localhost:8083/metrics \
            http://localhost:9100/metrics \
            http://localhost:15692/metrics

      - name: k6 smoke test via load balancer
        run: |
          docker run --rm --network host \
            -e BASE_URL=http://localhost:8080 \
            -e RATE=5 \
            -e DURATION=5s \
            -e MAX_LOSS_RATE=0.05 \
            -e DATA_EFETIVA=2099-01-01 \
            -e TEST_RUN_ID=ci-smoke-${{ github.run_id }}-${{ github.run_attempt }} \
            -v "$PWD/tests/load/k6:/scripts:ro" \
            grafana/k6 run /scripts/lancamentos-50rps.js

      - name: Logs em caso de falha
        if: failure()
        run: docker compose --profile full-ops logs --tail=300

      - name: Encerrar stack
        if: always()
        run: docker compose --profile full-ops down -v

  resiliencia-consolidado-down:
    name: RNF resiliencia consolidado down
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: maven-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir stack
        run: docker compose up --build -d

      - name: Aguardar readiness inicial
        run: |
          ./tests/ci/wait-url.sh \
            http://localhost:8080/health \
            http://localhost:8081/actuator/health/readiness \
            http://localhost:8084/actuator/health/readiness \
            http://localhost:8082/actuator/health/readiness \
            http://localhost:8085/actuator/health/readiness

      - name: Validar servico-lancamentos com consolidado parado
        env:
          BASE_URL: http://localhost:8080
        run: ./tests/ci/resiliencia-consolidado-down.sh

      - name: Logs em caso de falha
        if: failure()
        run: docker compose logs --tail=300

      - name: Encerrar stack
        if: always()
        run: docker compose down -v

  k6-50rps:
    name: RNF k6 50 req/s curto
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: maven-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir stack
        run: docker compose up --build -d

      - name: Aguardar readiness
        run: |
          ./tests/ci/wait-url.sh \
            http://localhost:8080/health \
            http://localhost:8081/actuator/health/readiness \
            http://localhost:8084/actuator/health/readiness \
            http://localhost:8082/actuator/health/readiness \
            http://localhost:8085/actuator/health/readiness

      - name: k6 50 req/s por 10s via load balancer
        env:
          TEST_RUN_ID: ci-50rps-${{ github.run_id }}-${{ github.run_attempt }}
          DATA_EFETIVA: 2099-01-03
        run: |
          docker run --rm --network host \
            -e BASE_URL=http://localhost:8080 \
            -e RATE=50 \
            -e DURATION=10s \
            -e MAX_LOSS_RATE=0.05 \
            -e DATA_EFETIVA="$DATA_EFETIVA" \
            -e TEST_RUN_ID="$TEST_RUN_ID" \
            -v "$PWD/tests/load/k6:/scripts:ro" \
            grafana/k6 run /scripts/lancamentos-50rps.js

      - name: Validar processamento Outbox e consumidor
        env:
          TEST_RUN_ID: ci-50rps-${{ github.run_id }}-${{ github.run_attempt }}
          DATA_EFETIVA: 2099-01-03
          EXPECTED_ITERATIONS: 500
          MAX_LOSS_RATE: 0.05
        run: ./tests/ci/verify-k6-outbox-and-cleanup.sh

      - name: Logs em caso de falha
        if: failure()
        run: docker compose logs --tail=300

      - name: Encerrar stack
        if: always()
        run: docker compose down -v
