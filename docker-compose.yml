services:
  postgres:
    image: postgres:15
    container_name: postgres-controle-financeiro
    environment:
      POSTGRES_DB: controle_financeiro
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d controle_financeiro"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - controle-lancamentos

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-controle-financeiro
    command: ["sh", "-c", "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"]
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - controle-lancamentos

  servico-lancamentos-a:
    build:
      context: ./servico-lancamentos
      dockerfile: Dockerfile
    container_name: servico-lancamentos-a
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      APP_DB_SCHEMA: lancamentos
      APP_OUTBOX_PUBLISHER_WORKER_ID: servico-lancamentos-a
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/controle_financeiro
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - controle-lancamentos

  servico-lancamentos-b:
    build:
      context: ./servico-lancamentos
      dockerfile: Dockerfile
    container_name: servico-lancamentos-b
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      APP_DB_SCHEMA: lancamentos
      APP_OUTBOX_PUBLISHER_WORKER_ID: servico-lancamentos-b
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/controle_financeiro
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - controle-lancamentos

  servico-consolidado-diario-a:
    build:
      context: ./servico-consolidado-diario
      dockerfile: Dockerfile
    container_name: servico-consolidado-diario-a
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      APP_DB_SCHEMA: consolidado
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/controle_financeiro
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - controle-lancamentos

  servico-consolidado-diario-b:
    build:
      context: ./servico-consolidado-diario
      dockerfile: Dockerfile
    container_name: servico-consolidado-diario-b
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      APP_DB_SCHEMA: consolidado
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/controle_financeiro
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - controle-lancamentos

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-controle-financeiro
    depends_on:
      servico-lancamentos-a:
        condition: service_healthy
      servico-lancamentos-b:
        condition: service_healthy
      servico-consolidado-diario-a:
        condition: service_healthy
      servico-consolidado-diario-b:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - controle-lancamentos

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: nginx-exporter-controle-financeiro
    profiles: ["full-ops"]
    depends_on:
      nginx:
        condition: service_healthy
    command:
      - -nginx.scrape-uri=http://nginx/nginx_status
    ports:
      - "9113:9113"
    networks:
      - controle-lancamentos

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus-controle-financeiro
    profiles: ["observability"]
    depends_on:
      servico-lancamentos-a:
        condition: service_healthy
      servico-lancamentos-b:
        condition: service_healthy
      servico-consolidado-diario-a:
        condition: service_healthy
      servico-consolidado-diario-b:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - controle-lancamentos

  prometheus-full-ops:
    image: prom/prometheus:v2.55.1
    container_name: prometheus-controle-financeiro
    profiles: ["full-ops"]
    depends_on:
      servico-lancamentos-a:
        condition: service_healthy
      servico-lancamentos-b:
        condition: service_healthy
      servico-consolidado-diario-a:
        condition: service_healthy
      servico-consolidado-diario-b:
        condition: service_healthy
      alertmanager:
        condition: service_started
      cadvisor:
        condition: service_started
      node-exporter:
        condition: service_started
      nginx-exporter:
        condition: service_started
      loki:
        condition: service_started
      promtail:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus-full-ops.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      controle-lancamentos:
        aliases:
          - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager-controle-financeiro
    profiles: ["full-ops"]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - controle-lancamentos

  grafana:
    image: grafana/grafana:11.5.0
    container_name: grafana-controle-financeiro
    profiles: ["observability"]
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - controle-lancamentos

  grafana-full-ops:
    image: grafana/grafana:11.5.0
    container_name: grafana-controle-financeiro
    profiles: ["full-ops"]
    depends_on:
      prometheus-full-ops:
        condition: service_started
      loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - controle-lancamentos

  loki:
    image: grafana/loki:3.2.1
    container_name: loki-controle-financeiro
    profiles: ["full-ops"]
    command:
      - -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - controle-lancamentos

  promtail:
    image: grafana/promtail:3.2.1
    profiles: ["full-ops"]
    depends_on:
      loki:
        condition: service_started
    container_name: promtail-controle-financeiro
    command:
      - -config.file=/etc/promtail/promtail.yml
    ports:
      - "9080:9080"
    volumes:
      - ./docker/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - promtail_positions:/var/lib/promtail
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - controle-lancamentos

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor-controle-financeiro
    profiles: ["full-ops"]
    privileged: true
    ports:
      - "8083:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - controle-lancamentos

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    container_name: node-exporter-controle-financeiro
    profiles: ["full-ops"]
    pid: host
    command:
      - --path.rootfs=/host
      - --no-collector.diskstats
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/user|var/lib/docker/.+)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|overlay|proc|pstore|rpc_pipefs|securityfs|sysfs|tracefs|tmpfs)$$
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro
    networks:
      - controle-lancamentos

volumes:
  postgres_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:
  promtail_positions:

networks:
  controle-lancamentos:
    driver: bridge
